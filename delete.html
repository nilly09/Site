<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Excluir Contato</title>

<script>
function deletar() {

    const id = document.getElementById("id").value;

    if (!confirm("Tem certeza que deseja excluir?")) return;

    fetch("deletar.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "id=" + id
    })
    .then(res => res.json())
    .then(res => {
        alert(res.mensagem);
    })
    .catch(() => {
        alert("Erro ao excluir");
    });
}
</script>

</head>

<body>

<h1>Excluir Contato</h1>

<label>ID do contato:</label><br>
<input type="number" id="id"><br><br>

<button onclick="deletar()">Excluir</button>

</body>
</html>
