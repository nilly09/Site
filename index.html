<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Formulário de Contato</title>
<link rel="stylesheet" href="style.css">

<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("formContato");

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        const formData = new FormData(form);

        fetch("processar.php", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(res => {

            alert(res.mensagem);

            if (res.status === "sucesso") {
                form.reset();
                listar();
            }
        })
        .catch(() => {
            alert("Erro ao enviar.");
        });
    });

    // carregar lista ao abrir página
    listar();
});

function listar() {
    fetch("listar.php")
    .then(res => res.json())
    .then(dados => {

        let box = document.getElementById("lista");
        box.innerHTML = "";

        dados.forEach(item => {
            box.innerHTML += `
                <div class="card">
                    <b>Nome:</b> ${item.nome}<br>
                    <b>Email:</b> ${item.email}<br>
                    <b>Mensagem:</b> ${item.mensagem}<br><br>

                    <button onclick="editar(${item.id})">Editar</button>
                    <button onclick="deletar(${item.id})">Excluir</button>

                    <hr>
                </div>
            `;
        });
    });
}

function deletar(id) {

    if (!confirm("Deseja excluir?")) return;

    fetch("deletar.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "id=" + id
    })
    .then(res => res.json())
    .then(res => {
        alert(res.mensagem);
        listar();
    });
}

function editar(id) {

    const nome = prompt("Novo nome:");
    const email = prompt("Novo email:");
    const mensagem = prompt("Nova mensagem:");

    fetch("editar.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `id=${id}&nome=${nome}&email=${email}&mensagem=${mensagem}`
    })
    .then(res => res.json())
    .then(res => {
        alert(res.mensagem);
        listar();
    });
}
</script>

</head>

<body>

<!-- 🔹 FORMULÁRIO -->
<form id="formContato">

    <h1>Formulário de Contato</h1>

    <label>Nome:</label>
    <input type="text" name="nome" required>

    <label>Email:</label>
    <input type="email" name="email" required>

    <label>Senha:</label>
    <input type="password" name="senha" required>

    <label>Mensagem:</label>
    <textarea name="mensagem" maxlength="250" required></textarea>

    <button type="submit">Enviar</button>

</form>
<br><br>

<button onclick="window.location.href='update.html'">
    Ir para Atualizar (UPDATE)
</button>

<button onclick="window.location.href='delete.html'">
    Ir para Excluir (DELETE)
</button>

<!-- 🔹 LISTA (READ) -->
<h2>Contatos cadastrados</h2>

<div id="lista"></div>

</body>
</html>
